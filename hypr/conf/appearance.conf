# Includes general, decoration, and animations
# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 20

    border_size = 2

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 10
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 8
        passes = 3
        vibrancy = 0.1696
	new_optimizations = true
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # ── Curves ────────────────────────────────────────────────────────────────
    #
    # macSnap   — fast deceleration, hits target and stops (window open/move)
    # macDrop   — starts fast, eases to stop (workspace slide)
    # macOut    — instant acceleration, very brief (window/layer close)
    # macFade   — quick linear-ish fade (opacity transitions)
    #
    #        NAME,      X0,    Y0,    X1,    Y1
    bezier = macSnap,   0.13,  0.99,  0.29,  1.0
    bezier = macDrop,   0.25,  1.0,   0.5,   1.0
    bezier = macOut,    0.06,  0.9,   0.19,  1.0
    bezier = macFade,   0.4,   0.0,   0.6,   1.0

    # ── Windows ───────────────────────────────────────────────────────────────
    #           NAME,          ONOFF, SPEED, CURVE,    [STYLE]
    animation = windows,       1,     5,     macSnap
    animation = windowsIn,     1,     4,     macSnap,  popin 80%   # scale up from ~80%, spring to full
    animation = windowsOut,    1,     2,     macOut,   popin 80%   # snap away fast
    animation = windowsMove,   1,     4,     macSnap               # snappy tile/drag reposition

    # ── Fades ─────────────────────────────────────────────────────────────────
    animation = fadeIn,        1,     2,     macFade
    animation = fadeOut,       1,     1.5,   macFade
    animation = fade,          1,     2.5,   macFade

    # ── Layers (rofi, anyrun, notifications, etc.) ────────────────────────────
    animation = layers,        1,     3,     macSnap
    animation = layersIn,      1,     3,     macSnap,  slide
    animation = layersOut,     1,     1.5,   macOut,   fade
    animation = fadeLayersIn,  1,     2,     macFade
    animation = fadeLayersOut, 1,     1.5,   macFade

    # ── Workspaces ────────────────────────────────────────────────────────────
    animation = workspaces,    1,     3.5,   macDrop,  slidevert   # vertical swipe feel like macOS Mission Control
    animation = workspacesIn,  1,     3.5,   macDrop,  slide
    animation = workspacesOut, 1,     3,     macOut,   slide

    # ── Border & zoom ─────────────────────────────────────────────────────────
    animation = border,        1,     4,     macSnap
    animation = zoomFactor,    1,     5,     macSnap
}


# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule = bordersize 0, floating:0, onworkspace:w[tv1]
# windowrule = rounding 0, floating:0, onworkspace:w[tv1]
# windowrule = bordersize 0, floating:0, onworkspace:f[1]
# windowrule = rounding 0, floating:0, onworkspace:f[1]

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}
